---
# Welcome to your prefect.yaml file! You can use this file for
# storing and managing configuration for deploying your flows.
# We recommend committing this file to source control along
# with your flow code.

# Generic metadata about this project
name: cnc-etl
prefect-version: 3.6.23

# This project is configured for a local `process` work pool.
# We keep build/push/pull empty and run workers from the repo directory.
build: []
push: []
pull: []

# the deployments section allows you to provide configuration
# for deploying flows
deployments:
- name: umbrella
  description: Fetch and upload umbrella project stats.
  tags: ["cnc", "stats"]
  entrypoint: flows/update_umbrella_stats.py:update_umbrella_stats
  parameters: {}
  work_pool:
    name: cnc-etl
    work_queue_name: null
    job_variables:
      # Relative to the worker process working directory.
      # Run the worker from the repo root (or set WorkingDirectory in systemd).
      working_dir: "."

- name: additional
  description: Fetch and upload additional stats for each project.
  tags: ["cnc", "stats"]
  entrypoint: flows/update_additional_stats.py:update_additional_stats
  parameters: {}
  work_pool:
    name: cnc-etl
    work_queue_name: null
    job_variables:
      working_dir: "."

- name: compose
  description: Merge umbrella + additional stats and upload combined city results.
  tags: ["cnc", "stats"]
  entrypoint: flows/compose.py:compose_city_results
  parameters: {}
  work_pool:
    name: cnc-etl
    work_queue_name: null
    job_variables:
      working_dir: "."

- name: strapi
  description: Fetch and upload Strapi results for the configured CNC year.
  tags: ["cnc", "stats"]
  entrypoint: flows/update_strapi_stats.py:update_strapi_results
  parameters: {}
  work_pool:
    name: cnc-etl
    work_queue_name: null
    job_variables:
      working_dir: "."

- name: non-inat
  description: Fetch and upload non-iNaturalist project stats for the configured CNC year.
  tags: ["cnc", "stats"]
  entrypoint: flows/update_non_inat_stats.py:update_non_inat_stats
  parameters: {}
  work_pool:
    name: cnc-etl
    work_queue_name: null
    job_variables:
      working_dir: "."
