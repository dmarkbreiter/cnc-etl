name: Deploy to Droplet

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: deploy-droplet
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.DROPLET_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy (ssh)
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
          DROPLET_PORT: ${{ secrets.DROPLET_PORT }}
        run: |
          PORT="${DROPLET_PORT:-22}"
          ssh -p "$PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes "${DROPLET_USER}@${DROPLET_HOST}" \
            "sudo /srv/cnc-etl/deploy/remote_deploy.sh"
